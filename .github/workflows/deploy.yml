name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/MoodCast/backend
            git pull origin main
            # 기존 도커 컨테이너 종료 및 삭제
            docker compose down
            # 새로 빌드
            mvn clean package -DskipTests
            # 백그라운드 실행
            docker compose up --build -d
